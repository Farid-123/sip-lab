#!KAMAILIO

####### Global Parameters #########

debug=3
log_stderror=yes
fork=yes
children=2

listen=udp:0.0.0.0:5060

####### Modules Section ########

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "pv.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "rtpengine.so"

####### Module Parameters ########

# registrar / usrloc (no DB)
modparam("usrloc", "db_mode", 0)

# RTPengine socket
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

####### Routing Logic ########

request_route {

    # Sanity check
    if (!sanity_check("1511", "7")) {
        xlog("Malformed SIP message from $si\n");
        exit;
    }

    # Max-Forwards protection
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }

    # Handle REGISTER (no auth for now)
    if (is_method("REGISTER")) {
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    # Handle INVITE (call routing)
    if (is_method("INVITE")) {
        xlog("L_INFO", ">>> INVITE detected: $ru from $si:$sp\n");
        # RTPengine handling
        if (has_body("application/sdp")) {
            rtpengine_manage();
        }

        # Forward to FreeSWITCH
        $du = "sip:192.168.100.10:5080";
        t_relay();
        exit;
    }

    # Default relay for other requests
    if (!t_relay()) {
        xlog("L_ERR", "t_relay failed\n");
        sl_reply_error();
    }
}


